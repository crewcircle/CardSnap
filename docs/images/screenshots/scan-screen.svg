<svg xmlns="http://www.w3.org/2000/svg" width="360" height="720" viewBox="0 0 360 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#003DB3;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="360" height="720" fill="url(#bg)"/>
  <rect x="0" y="0" width="360" height="44" fill="#0066FF"/>
  <text x="180" y="28" text-anchor="middle" fill="white" font-family="Inter,sans-serif" font-size="18" font-weight="700">CardSnap</text>
  <rect x="40" y="120" width="280" height="400" rx="16" fill="rgba(255,255,255,0.1)" stroke="white" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="180" y="330" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter,sans-serif" font-size="14">Fit the card inside the frame</text>
  <text x="180" y="560" text-anchor="middle" fill="white" font-family="Inter,sans-serif" font-size="16">Point camera at business card</text>
  <text x="180" y="580" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="Inter,sans-serif" font-size="14">and tap to capture</text>
  <circle cx="180" cy="640" r="30" fill="white"/>
  <circle cx="180" cy="640" r="24" fill="#0066FF"/>
  <text x="180" y="646" text-anchor="middle" fill="white" font-size="20">📷</text>
  <circle cx="60" cy="72" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="60" y="78" text-anchor="middle" fill="white" font-size="16">⚡</text>
  <circle cx="300" cy="72" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="300" y="78" text-anchor="middle" fill="white" font-size="16">👥</text>
  <text x="180" y="690" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter,sans-serif" font-size="12">or upload a photo</text>
</svg>
