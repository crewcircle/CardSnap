name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-android:
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
         
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk ../CardSnap-${{ github.ref_name }}-android.apk
        
      - name: Upload Android Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: CardSnap-${{ github.ref_name }}-android.apk
          asset_name: CardSnap-${{ github.ref_name }}-android.apk
          asset_content_type: application/vnd.android.package-archive

  build-ios:
    runs-on: macos-latest
    needs: create-release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install iOS pods
        run: |
          cd ios
          pod install
          cd ..
          
      - name: Build iOS Release
        run: |
          xcodebuild -workspace ios/CardSnap.xcworkspace \
            -scheme CardSnap \
            -configuration Release \
            -sdk iphoneos \
            -archivePath CardSnap.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath CardSnap.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build
          cp build/CardSnap.ipa CardSnap-${{ github.ref_name }}-ios.ipa
            
      - name: Upload iOS Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: CardSnap-${{ github.ref_name }}-ios.ipa
          asset_name: CardSnap-${{ github.ref_name }}-ios.ipa
          asset_content_type: application/octet-stream
