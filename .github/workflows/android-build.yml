name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 20.19.0
      JAVA_VERSION: 17

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../CardScanner-debug-android.apk

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk ../CardScanner-release-android.apk

      - name: Upload Android Debug Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: CardScanner-debug-android.apk

      - name: Upload Android Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: CardScanner-release-android.apk
